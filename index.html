<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="favicon.jpeg.jpeg">
<link rel="manifest" href="manifest.json">
<title>School Hub 2026</title>
<style>
  body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 10px; }
  h1 { text-align: center; color: #2d89ef; margin-bottom: 20px; }

  .month { margin-bottom: 25px; }
  .month-name { text-align: center; font-size: 20px; margin-bottom: 10px; color: #1b5dab; }
  .calendar { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
  .dateBtn { padding: 6px 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; }
  .dateBtn.selected { background: #2d89ef; color: white; }
  .dateBtn.today { border: 2px solid #ff6b6b; }

  /* Event colors */
  .exam { background-color: #fffa65; }
  .holiday { background-color: #ff6b6b; color: white; }
  .news { background-color: #6bcfff; color: white; }
  .special { background-color: #9b59b6; color: white; }

  /* Info boxes */
  #newsBox, #holidayBox, #specialBox {
    border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; min-height: 40px; background: #f9f9f9;
  }
</style>
</head>
<body>

<h1>2026 School Hub</h1>
<button id="teacherToggle" 
        style="position:fixed;top:10px;right:10px;z-index:1000;"
        onclick="toggleTeacherButtons()">Teacher Panel</button>

<div id="teacherButtons" style="display:none;position:fixed;top:50px;right:10px;z-index:1000;background:#fff;padding:10px;border:1px solid #ccc;border-radius:5px; color: black;">
  <button onclick="showAddNote()">Add Note</button>
  <button onclick="showViewNotes()">View Notes</button>
  
  <div id="addNoteDiv" style="display:none;margin-top:10px;">
    <input type="password" id="addPass" placeholder="Password"><br>
    <textarea id="teacherComment" placeholder="Write note..."></textarea><br>
    <button onclick="submitTeacherNote()">Submit</button>
  </div>

  <div id="viewNotesDiv" style="display:none;margin-top:10px;">
    <input type="password" id="viewPass" placeholder="Password"><br>
    <button onclick="displayNotes()">Show Notes</button>
    <div id="notesDisplay" style="max-height: 200px; overflow-y: auto;"></div>
  </div>
</div>
</script>
<div id="calendarContainer"></div>

<div id="newsBox">News: None</div>
<div id="holidayBox">Holiday: None</div>
<div id="specialBox">Special: None</div>

<script type="module" src="script.js"></script>
</body>
</html>
