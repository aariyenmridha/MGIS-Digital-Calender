<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026 School Hub</title>

<!-- Favicon -->
<link rel="icon" type="image/jpeg" href="favicon.jpeg.jpeg">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1000px;
  margin: 20px auto;
  padding: 10px;
}

h1 {
  text-align: center;
  color: #2d89ef;
}

.month {
  margin-bottom: 30px;
}

.month-name {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
  color: #1b5dab;
}

.calendar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: center;
}

.dateBtn {
  padding: 6px 10px;
  cursor: pointer;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #f0f0f0;
}

.dateBtn:hover {
  background: #ddd;
}

.dateBtn.selected {
  background: #2d89ef;
  color: white;
}

.dateBtn.today {
  border: 2px solid #ff6b6b;
}

.holiday {
  background-color: #ff6b6b;
  color: white;
}

.exam {
  background-color: #fffa65;
}

.special {
  background-color: #9b59b6;
  color: white;
}

#newsBox, #holidayBox, #specialBox {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 10px;
  min-height: 40px;
  background: #f9f9f9;
}
</style>
</head>

<body>

<h1>2026 School Hub</h1>

<div id="calendarContainer"></div>

<div id="newsBox">News: None</div>
<div id="holidayBox">Holiday: None</div>
<div id="specialBox">Special: None</div>

<!-- LINKED SCRIPT -->
<script src="script.js"></script>

</body>
</html>
