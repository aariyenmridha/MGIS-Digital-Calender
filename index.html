<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpeg" href="favicon.jpeg.jpeg">
<link rel="manifest" href="manifest.json">
<title>School Hub 2026</title>
<style>
  body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 10px; }
  h1 { text-align: center; color: #2d89ef; margin-bottom: 20px; }

  .month { margin-bottom: 25px; }
  .month-name { text-align: center; font-size: 20px; margin-bottom: 10px; color: #1b5dab; }
  .calendar { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
  .dateBtn { padding: 6px 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; }
  .dateBtn.selected { background: #2d89ef; color: white; }
  .dateBtn.today { border: 2px solid #ff6b6b; }

  /* Event colors */
  .exam { background-color: #fffa65; }
  .holiday { background-color: #ff6b6b; color: white; }
  .news { background-color: #6bcfff; color: white; }
  .special { background-color: #9b59b6; color: white; }

  /* Info boxes */
  #newsBox, #holidayBox, #specialBox {
    border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; min-height: 40px; background: #f9f9f9;
  }
  <!-- Top corner toggle -->
<button id="teacherToggle" 
        style="position:fixed;top:10px;right:10px;z-index:1000;"
        onclick="toggleTeacherButtons()">Teacher Panel</button>

<!-- Hidden teacher buttons -->
<div id="teacherButtons" style="display:none;position:fixed;top:50px;right:10px;z-index:1000;background:#fff;padding:10px;border:1px solid #ccc;border-radius:5px;">
  <button onclick="showAddNote()">Add Note</button>
  <button onclick="showViewNotes()">View Notes</button>
</div>

<!-- Add Note Section -->
<div id="addNoteDiv" style="display:none;margin-top:10px;">
  <input type="password" id="addPass" placeholder="Password to add"><br>
  <textarea id="teacherComment" placeholder="Write your note here"></textarea><br>
  <button onclick="submitTeacherNote()">Submit</button>
</div>

<!-- View Notes Section -->
<div id="viewNotesDiv" style="display:none;margin-top:10px;">
  <input type="password" id="viewPass" placeholder="Password to view"><br>
  <button onclick="displayNotes()">Show Notes</button>
  <div id="notesDisplay"></div>
</div>

<script>
const password = "MGIS123"; // both add/view can use same

// Store notes locally
let notes = []; // {text, timestamp}

// toggle Add/View buttons
function toggleTeacherButtons() {
    const btnDiv = document.getElementById("teacherButtons");
    btnDiv.style.display = btnDiv.style.display === "none" ? "block" : "none";
}

function showAddNote() {
    document.getElementById("addNoteDiv").style.display = "block";
    document.getElementById("viewNotesDiv").style.display = "none";
}

function showViewNotes() {
    document.getElementById("viewNotesDiv").style.display = "block";
    document.getElementById("addNoteDiv").style.display = "none";
}

// Add note locally
function submitTeacherNote() {
    const pass = document.getElementById("addPass").value;
    const comment = document.getElementById("teacherComment").value.trim();
    if(pass !== password) { alert("Wrong password"); return; }
    if(comment === "") return;
    const timestamp = new Date().getTime();
    notes.push({text: comment, timestamp});
    alert("Note added!");
    document.getElementById("teacherComment").value = "";
}

// Display notes
function displayNotes() {
    const pass = document.getElementById("viewPass").value;
    if(pass !== password) { alert("Wrong password"); return; }
    const now = new Date().getTime();
    const THIRTY_DAYS = 30*24*60*60*1000;
    
    // filter notes older than 30 days
    notes = notes.filter(n => now - n.timestamp < THIRTY_DAYS);

    const displayDiv = document.getElementById("notesDisplay");
    displayDiv.innerHTML = "";
    if(notes.length === 0) {
        displayDiv.innerHTML = "<i>No notes</i>";
        return;
    }
    notes.forEach(n => {
        const p = document.createElement("p");
        p.textContent = n.text;
        displayDiv.appendChild(p);
    });
}
</script>
</style>
</head>
<body>

<h1>2026 School Hub</h1>

<div id="calendarContainer"></div>

<div id="newsBox">News: None</div>
<div id="holidayBox">Holiday: None</div>
<div id="specialBox">Special: None</div>

<script type="module" src="script.js"></script>
</body>
</html>
